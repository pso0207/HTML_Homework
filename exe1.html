<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 응용문제</title>
</head>
<body>
    
    <h1>My First Heading</h1>
    <hr> <!-- 가로 실선을 그어줌-->
    <p>My First paragraph </p> <!--  <p>는 문단의 시작을 의미함 -->
    <br>
    <ul style="list-style-type: circle;">
        <li>List Item</li>
        <li>List Item</li>
        <li>List Item</li>
    </ul>    <!-- ul은 순서가 없는 목록, ol은 순서가 있는 목록-->
    <table border = "1", width="200px"> <!-- 테이블 선언할 때는 행을 선언하고 열을 선언해야됨-->
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
        
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
            <td>4</td>
        </tr>
    </table>
    <ol type = "A">
        <li>List Item</li>
        <li>List Item</li>
        <li>List Item</li>
    </ol>

    
    <p>My First paragraph </p>
    <img src="IMG_832.JPG" height="150px" alt="picture">
    <br>
    <a href="https://www.naver.com ">first link</a>

</body>
</html>
